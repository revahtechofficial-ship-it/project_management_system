# Nexax local stack: shared PostgreSQL + Vikunja (the task engine the Go BFF calls).
#
# The Go backend is the BFF. In dev it normally runs on the HOST
# (`cd backend && go run ./cmd/server`) and connects to Postgres on localhost:5432.
# To also run the backend in a container:  docker compose --profile app up -d
#
# Requirements: Docker Desktop for Windows (WSL2 backend).
# NOTE: the Vikunja docs' `mkdir files db && chown 1000 files db` step is Linux-only
# and is NOT needed here — Docker creates the volumes below for you.

name: nexax

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Host 5433 -> container 5432. Host 5432 is often taken by a native
      # PostgreSQL install; 5433 avoids that conflict. (Vikunja still uses 5432
      # internally over the Docker network — unaffected.)
      - "5433:5432"
    volumes:
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  vikunja:
    image: vikunja/vikunja:2.3.0
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL:-http://localhost:3456/}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:?set VIKUNJA_SERVICE_SECRET in .env (openssl rand -hex 32)}
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: vikunja # dev only — matches deploy/postgres/init/01-databases.sql
      VIKUNJA_DATABASE_DATABASE: vikunja
      # OIDC SSO via Keycloak (issuer reachable from the container via host.docker.internal).
      VIKUNJA_AUTH_OPENID_ENABLED: "true"
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME: Keycloak
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL: http://host.docker.internal:8088/realms/nexax
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID: vikunja
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTSECRET: vikunja-oidc-dev-secret # dev only
      VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_SCOPE: openid profile email
    ports:
      - "3456:3456"
    volumes:
      - ./data/vikunja-files:/app/vikunja/files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      # Canonical issuer URL — reachable identically from the host browser and
      # from other containers (host.docker.internal). Keeps the token issuer
      # consistent so Vikunja can validate Keycloak tokens server-side.
      KC_HOSTNAME: http://host.docker.internal:8088
    ports:
      - "8088:8080" # admin console + OIDC at http://localhost:8088
    volumes:
      - ./deploy/keycloak/import:/opt/keycloak/data/import:ro
      - kcdata:/opt/keycloak/data
    restart: unless-stopped

  # Optional: run the Go BFF in Docker too ->  docker compose --profile app up -d
  backend:
    profiles: ["app"]
    build: ./backend
    environment:
      DATABASE_URL: postgres://nexax:nexax@db:5432/nexax?sslmode=disable # dev only
      VIKUNJA_BASE_URL: http://vikunja:3456
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      vikunja:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  kcdata:
