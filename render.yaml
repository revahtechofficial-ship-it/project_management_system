# Render Blueprint for the Revah Management System backend (Go BFF + Postgres).
#
# One-time setup:
#   1. Push this file to GitHub.
#   2. On https://dashboard.render.com → "New" → "Blueprint" → pick this repo.
#   3. Render reads this file and provisions the database + web service.
#   4. Fill in the secret env vars marked `sync: false` (SMTP, CORS_ORIGIN, etc.).
#
# Migrations run automatically on boot (goose, embedded in the binary), so the
# database is set up on first deploy — no manual step.
#
# FREE (no card) setup. Trade-offs to be aware of:
#   * The web service SLEEPS after ~15 min idle; the next request cold-starts
#     (~50s). The chat socket auto-reconnects after a wake.
#   * There is no persistent disk, so uploaded files (chat media, avatars) are
#     written to /tmp and RESET on every redeploy.
#   * The free Postgres EXPIRES after ~30 days.
# For production, switch both `plan: free` to a paid plan, add back a `disk:`
# block on the web service, and set UPLOAD_DIR to the disk's mount path.

databases:
  - name: revahms-db
    databaseName: revahms
    user: revahms
    plan: free # expires after ~30 days; upgrade for production

services:
  - type: web
    name: revahms-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: revahms-db
          property: connectionString
      - key: PORT
        value: "8080"
      # /tmp is writable by the non-root container user (no disk on free plan).
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: APP_NAME
        value: Revah Management System
      - key: JWT_SECRET
        generateValue: true # Render creates a strong secret
      # The browser origin of the deployed frontend (GitHub Pages / your domain).
      - key: CORS_ORIGIN
        sync: false
      # OTP email (your Gmail App Password).
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Calls (optional) — leave blank to disable, or use LiveKit Cloud values.
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
